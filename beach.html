<!DOCTYPE html>
<html lang="en">
<head>
    <title>Beach</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style type="text/css">
		body, html {
		    margin: 0;
		    padding: 0;
		    width: 100%;
		    height: 100%;
		    overflow: hidden; 
		    /* Use !important to override Bootstrap, or use a gradient */
		    background: linear-gradient(to bottom, #87CEEB 0%, #B0E2FF 100%) !important;
		}

        .wave-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 250px;
            overflow: hidden;
            z-index: 10; /* Waves stay in front of the sky, but behind the tree base if desired */
            pointer-events: none;
        }

        .beach {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 200px;
            background: #e2cba1;
            -webkit-mask: radial-gradient(150% 180% at 50% 100%, #000 50%, #0000 50%);
            mask: radial-gradient(150% 180% at 50% 100%, #000 50%, #0000 50%);
            z-index: 1;
        }

        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%; 
            height: 120px;
            background: #0077ff;
            box-shadow: 0 50px 0 0 #0077ff; 
            --mask: 
                radial-gradient(67.08px at 50% 90px, #000 99%, #0000 101%) calc(50% - 60px) 0 / 120px 100% repeat-x,
                radial-gradient(67.08px at 50% -60px, #0000 99%, #000 101%) 50% 30px / 120px 100% repeat-x;
            -webkit-mask: var(--mask);
            mask: var(--mask);
        }

        .wave.back { z-index: 2; bottom: 15px; opacity: 0.6; animation: move-wave 10s linear infinite; }
        .wave.front { z-index: 3; bottom: 0; animation: move-wave 4s linear infinite reverse; }

        @keyframes move-wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-120px); }
        }

        /* --- THE PALM TREE REFINEMENT --- */

        .palm-tree {
            position: absolute;
            bottom: 80px;
            right: 15%;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .trunk {
            width: 25px;
            height: 200px;
            background: linear-gradient(to right, #6b3410, #8B4513, #a0522d);
            border-radius: 20% 20% 5px 5px;
            /* Slightly curved trunk */
            transform: skewX(-2deg);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            position: relative;
        }

        /* Adding "rings" to the trunk for texture */
        .trunk::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(transparent, transparent 15px, rgba(0,0,0,0.1) 16px);
        }

        .leaves {
            position: absolute;
            top: -10px; /* Sits on top of trunk */
            left: 50%;
            transform: translateX(-50%);
        }

        .leaf {
            position: absolute;
            width: 120px;
            height: 45px;
            background: linear-gradient(135deg, #228B22, #006400);
            border-radius: 100% 0% 100% 0%;
            transform-origin: left center;
            box-shadow: inset 2px -2px 5px rgba(0,0,0,0.2);
        }

        /* Better fanning for a 360-ish degree look */
        .leaf:nth-child(1) { transform: rotate(-10deg); }
        .leaf:nth-child(2) { transform: rotate(-50deg); }
        .leaf:nth-child(3) { transform: rotate(-90deg); }
        .leaf:nth-child(4) { transform: rotate(-130deg); }
        .leaf:nth-child(5) { transform: rotate(-170deg); }
        /* Extra leaves for fullness */
        .leaf:nth-child(6) { transform: rotate(20deg); width: 90px; }
        .leaf:nth-child(7) { transform: rotate(-190deg); width: 90px; }

		#login-container {
		    display: flex;
		    align-items: center;
		    justify-content: center;
		    position: fixed;
		    top: 0;
		    left: 0;
		    width: 100%;
		    height: 100%;
		    z-index: 100; 
		}
		#login {
		    width: 600px;
		    height: 350px;
		    background-color: #FFF;
		    border-radius: 12px;
		    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
		    padding: 20px;
		    box-sizing: border-box; 
		}
		h1 {
			text-align: center;
		}

		#signInBtn {
			margin-top: 10px;
			text-align: center;
		}
    </style>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>

    <div class="palm-tree">
        <div class="leaves">
            <div class="leaf"></div>
            <div class="leaf"></div>
            <div class="leaf"></div>
            <div class="leaf"></div>
            <div class="leaf"></div>
            <div class="leaf"></div>
            <div class="leaf"></div>
        </div>
        <div class="trunk"></div>
    </div>

    <div class="wave-container">
        <div class="beach"></div>
        <div class="wave back"></div>
        <div class="wave front"></div>
    </div>

    <div id="login-container">
    	<div id="login">
    		<h1>Login</h1>
    		<p>This was the first project I used AI to help me create.</p>
		  	<form>
			  	<div class="form-floating mb-3">
				  <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com">
				  <label for="floatingEmail">Email address</label>
				</div>
				<div class="form-floating">
				  <input type="password" class="form-control" id="floatingPassword" placeholder="password">
				  <label for="floatingPassword">Password</label>
				</div>
				<div id="signInBtn">
					<button type="button" class="btn btn-primary">Sign In</button>
				</div>
			</form>
    	</div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
