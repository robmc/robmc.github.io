<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Calculator</title>
	</head>
	<style type="text/css">
		h1 {
			text-align: center;
		}

		form {
			margin: auto;
			width: 40%;
		}

        .row-container {
        	display: flex;
        	flex-direction: row; 
        	justify-content: space-between;
        	margin: 5px;
        }

        .form-group {
        	display: flex;
        	margin: 5px;
        	width: 50%;
        	justify-content: space-between;
        }

        /* Chrome, Safari, Edge, Opera */
		input::-webkit-outer-spin-button,
		input::-webkit-inner-spin-button {
		  -webkit-appearance: none; /*removes the default arrows from elements*/
		  margin: 0;
		}

		/* Firefox */
		input[type=number] {
		  -moz-appearance: textfield; /*handles the removal of arrows on inputs with type "number" */
		}
	</style>
	<body>
		<h1>Calculator</h1>
		<form>
			<div class="row-container">
				<div class="form-group">
					<label for="jan">January</label>
					<input type="number" id="jan" />
				</div>
				<div class="form-group">
					<label for="feb">February</label>
					<input type="number" id="feb" />
				</div>
			</div>
			<div class="row-container">
				<div class="form-group">
					<label for="mar">March</label>
					<input type="number" id="mar" />
				</div>
				<div class="form-group">
					<label for="apr">April</label>
					<input type="number" id="apr" />
				</div>
			</div>
			<div class="row-container">
				<div class="form-group">
					<label for="may">May</label>
					<input type="number" id="may" />
				</div>
				<div class="form-group">
					<label for="jun">June</label>
					<input type="number" id="jun" />
				</div>
			</div>
			<div class="row-container">
				<div class="form-group">
					<label for="jul">July</label>
					<input type="number" id="jul" />
				</div>
				<div class="form-group">
					<label for="aug">August</label>
					<input type="number" id="aug" />
				</div>
			</div>
			<div class="row-container">
				<div class="form-group">
					<label for="sep">September</label>
					<input type="number" id="sep" />
				</div>
				<div class="form-group">
					<label for="oct">October</label>
					<input type="number" id="oct" />
				</div>
			</div>
			<div class="row-container">
				<div class="form-group">
					<label for="nov">November</label>
					<input type="number" id="nov" />
				</div>
				<div class="form-group">
					<label for="dec">December</label>
					<input type="number" id="dec" />
				</div>
			</div>
			<div style="text-align: center;">
				<label for="total"><strong>Total Yearly Amount:</strong></label>
				<input type="text" id="total" disabled />
			</div>
			<p>Purpose is to play with JavaScript and test ARIA Live announcements.</p>
		</form>
	</body>
</html>
