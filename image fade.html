<!DOCTYPE html>
<html lang="en">
<head>
	<style type="text/css">
		body, html {
			margin: 0;
			height: 100%;
		}

		#wrapper {
			position:relative;
			height: 100%;
			width: 100%;
		}

		#wrapper img{
			position:absolute;
			z-index:1;
			width: 100%;
			height: 100%;
			object-fit: cover;
		}

		#wrapper img.active{
			z-index:3;
		}

		.center {
		  position: absolute;
		  margin: auto;
		  top: 50%;
		  left: 50%;
		  border-radius: 25px;
		  border: 2px solid #DEDEDE;
		  height: 300px;
		  width: 500px;
		  overflow: hidden;
		  z-index: 1000;
		  background-color: white;
		  transform: translate(-50%, -50%);
		}

		.pause {
		  position: absolute;
		  top: 0;
		  overflow: hidden;
		}

		.pause:focus {
		  position: absolute;
		  top: 0;
		  z-index: 1000;
		}

		h1 {
			text-align: center;
		}
	</style>
</head>
<body>
	<button class="pause">Pause the Animation</button>
	<div id="wrapper">
	<img class="active" src="/images/dusk.jpg" alt="" />
	<img src="/images/night.jpg" alt="" />
	</div>
	<div class="center">
		<h1>Pause/Stop/Hide</h1>
		<p>Testing the ability to pause/stop animations. Press <code>Tab</code> to bring up the Pause button. The background image has an update animation every 7 seconds. This is testing to meet <a href="https://www.w3.org/WAI/WCAG21/Understanding/pause-stop-hide.html">WCAG Success Criteria 2.2.2 Pause, Stop, Hide</a>.</p>
	</div>
	<script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
	<script>
		function cycleImages(){
		      var $active = $('#wrapper .active');
		      var $next = ($active.next().length > 0) ? $active.next() : $('#wrapper img:first');
		      $next.css('z-index',2);//move the next image up the pile
		      $active.fadeOut(1500,function(){//fade out the top image
			  $active.css('z-index',1).show().removeClass('active');//reset the z-index and unhide the image
		          $next.css('z-index',3).addClass('active');//make the next image the top one
		      });
		    }

		$(document).ready(function(){
		// run every 7s
		setInterval('cycleImages()', 7000);
		})
	</script>
</body>

</html>
