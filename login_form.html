<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Login Form</title>
		<style type="text/css">
		html, body, .center {
			margin: 0;
    		height: 100%;
		}

		body {
			background-color: #9EEBFF;
		}
		.center {
			background-color: #9EEBFF;
		    display: flex;
		    align-items: center;
		    justify-content: center;
		}

		#wrapper {
		  position: absolute;
		  background-color: white;
		  border-radius: 20px;
		  width: 600px;
		  height: 350px;
		  border: 2px solid gray; 
		  z-index: 1;
		  overflow: hidden;
		}
		h1 {
			text-align: center;
		}
		.cloud, .cloud2 { 
			display: flex;
			position: fixed;
			top: 10%;
			right: 0;
   			width:350px;
   			height:120px;
   			background:#ECEFF1;
   			box-shadow: 10px 10px rgba(0,0,0,0.2);
   			border-radius:100px;
   			transform: translate(100%);
		}

		@keyframes move {
		  to {
		    right: 100%;
		    transform: translate(0);
		  }
		}

		.cloud {
			top: 10%;
			animation: move 9s linear infinite;			
		}

		.cloud2 { 
			top: 70%;
			animation: move 17s linear infinite;
		}

		.cloud:after, .cloud:before, .cloud2:after, .cloud2:before {
		    content:"";
		    position:relative;
		    display:inline-block;
		    background:inherit;
		    border-radius:inherit;
		}

		.cloud::after, .cloud2::after {
		    width:100px;
		    height:100px;
		    top:-25%;
		    left:-35%;
		}

		.cloud::before, .cloud2::before {
		    width:180px;
		    height:180px;
		    top: -50%;
		    left:35%;
		}

		.neck {
		  position: absolute;
		  margin-top: -325px;
		  margin-left: 0px;
		  height: 150px;
		  width: 50px;
		  background-color: #555;
		  border-radius: 25px 25px 0px 25px;
		}

		.body {
		  position: absolute;
		  margin-top: -225px;
		  margin-left: 10px;
		  height: 50px;
		  width: 150px;
		  background-color: #555;
		  border-radius: 0px 25px 0px 25px;  /*first value applies to top-left corner, second value applies to top-right corner, third value applies to bottom-right corner, and fourth value applies to bottom-left corner */
		}

		#toucan {
			position: relative;
		}

		.eye {
		  position: absolute;
		  margin-top: -310px;
		  margin-left: 10px;
		  height: 30px;
		  width: 30px;
		  background-color: #FFF;
		  border-radius: 25px 25px 25px 25px;
		}

		.iris {
		  position: absolute;
		  margin-top: -305px;
		  margin-left: 14px;
		  height: 20px;
		  width: 20px;
		  background-color: #0093DB;
		  border-radius: 25px 25px 25px 25px;
		}

		.pupil {
		  position: absolute;
		  margin-top: -303px;
		  margin-left: 17px;
		  height: 15px;
		  width: 15px;
		  background-color: #000;
		  border-radius: 25px 25px 25px 25px;
		}

		.wing-outer {
		  position: absolute;
		  margin-top: -240px;
		  margin-left: 40px;
		  height: 40px;
		  width: 90px;
		  background-color: #34AD3D;
		  border-radius: 0px 0px 50px 50px;
		}

		.wing-inner {
		  position: absolute;
		  margin-top: -240px;
		  margin-left: 55px;
		  height: 30px;
		  width: 60px;
		  background-color: #D9D445;
		  border-radius: 0px 0px 50px 50px;
		}

		.beak {
		  position: absolute;
		  margin-top: -300px;
		  margin-left: -70px;
		  height: 30px;
		  width: 80px;
		  background-color: #F2F527;
		  border-radius: 50px 0px 0px 0px;
		}

		.beak2 {
		  position: absolute;
		  margin-top: -300px;
		  margin-left: -70px;
		  height: 30px;
		  width: 40px;
		  background-color: #F58E27;
		  border-radius: 50px 0px 0px 0px;
		}

		form {
		 	position:relative;
			width: 250px;
			margin-left: auto;
			margin-right: auto;
		}
		p {
			margin: 5px
		}
		footer {
			margin: 5px;
		}
		#signInBtn {
			margin-top: 10px;
			text-align: center;
		}
		</style>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	</head>
	<body>
		<div class="cloud"></div>
		<div class="cloud2"></div>
		<div class="center">
			<div id="toucan">
				<div class="beak"></div>
				<div class="beak2"></div>
				<div class="neck"></div>
				<div class="body"></div>
				<div class="eye"></div>
				<div class="iris"></div>
				<div class="pupil"></div>
				<div class="wing-outer"></div>
				<div class="wing-inner"></div>
			</div>
		  <div id="wrapper">
		  	<h1>Login</h1>
		  	<p>I learned how to draw and animate clouds with CSS for this...</p>
		  	<form>
			  	<div class="form-floating mb-3">
				  <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com">
				  <label for="floatingEmail">Email address</label>
				</div>
				<div class="form-floating">
				  <input type="password" class="form-control" id="floatingPassword" placeholder="password">
				  <label for="floatingPassword">Password</label>
				</div>
				<div id="signInBtn">
				 <button type="button" class="btn btn-primary">Sign In</button>
				</div>
			</form>
		  	<footer>
				<a href="http://robertjmccaffery.com/examples.html">Back to Examples</a> | <a href="http://robertjmccaffery.com/">Home</a>
			</footer>
		  </div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
	</body>
</html>
