<!DOCTYPE html>
<html lang="en">
	<head>
		<title>Login Form</title>
		<style>
		body, html {
		  margin: 0;
		  height: 100%;
		}
		.center {
		  display: flex;
		  justify-content: center;
		  align-items: center;
		  height: 100vh;
		  background-color: #9EEBFF;
		}
		#wrapper {
		  background-color: white;
		  border-radius: 20px;
		  width: 600px;
		  height: 350px;
		  border: 2px solid gray; 
		}
		h1 {
			text-align: center;
		}
		.cloud, .cloud2 { 
			display: flex;
			position: fixed;
			top: 10%;
   			width:350px;
   			height:120px;
   			background:#ECEFF1;
   			box-shadow: 10px 10px rgba(0,0,0,0.2);
   			border-radius:100px;
		}

		.cloud {
			top: 10%;			
		}

		.cloud2 { 
			top: 60%;
			left: 75%;
		}

		.cloud:after, .cloud:before, .cloud2:after, .cloud2:before {
		    content:"";
		    position:relative;
		    display:inline-block;
		    background:inherit;
		    border-radius:inherit;
		}

		.cloud::after, .cloud2::after {
		    width:100px;
		    height:100px;
		    top:-25%;
		    left:-35%;
		}

		.cloud::before, .cloud2::before {
		    width:180px;
		    height:180px;
		    top: -50%;
		    left:35%;
		}
		form {
		 	position:relative;
			width: 250px;
			margin-left: auto;
			margin-right: auto;
		}
		p {
			margin: 5px
		}
		footer {
			margin: 5px;
		}
		#signInBtn {
			margin-top: 10px;
			text-align: center;
		}
		</style>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	</head>
	<body>
		<div class="cloud"></div>
		<div class="cloud2"></div>
		<div class="center">
		  <div id="wrapper">
		  	<h1>Login Form</h1>
		  	<p>I learned how to draw clouds with CSS for this...</p>
		  	<form>
			  	<div class="form-floating mb-3">
				  <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com">
				  <label for="floatingEmail">Email address</label>
				</div>
				<div class="form-floating">
				  <input type="password" class="form-control" id="floatingPassword" placeholder="password">
				  <label for="floatingPassword">Password</label>
				</div>
				<div id="signInBtn">
				 <button type="button" class="btn btn-primary">Sign In</button>
				</div>
			</form>
		  	<footer>
				<a href="http://robertjmccaffery.com/examples.html">Back to Examples</a> | <a href="http://robertjmccaffery.com/">Home</a>
			</footer>
		  </div>
		</div>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
	</body>
</html>
