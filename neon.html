<!DOCTYPE html>
<html lang="en">
<head>
    <title>Neon</title>
    <style type="text/css">
        body, html {
            margin: 0;
            height: 100%;
        }
        body {
            font-family: "Vibur", sans-serif;
            background-color: #010a01;
        } 
        .center {
            display: flex;
            height: 100vh; 
            justify-content: center; 
            align-items: center; 
        }
        .neon {
            color: #fff;
            text-shadow:
                0 0 7px #fff,
                0 0 10px #fff,
                0 0 21px #fff,
                0 0 42px #0fa,
                0 0 82px #0fa,
                0 0 92px #0fa,
                0 0 102px #0fa,
                0 0 151px #0fa;
            font-size: 4rem;
            text-align: center;
            animation: blinker 3s linear infinite;
        }
		@keyframes blinker {
		  50% {
		    opacity: 0;
		  }
		}
		footer {
			position: absolute;
			text-align: center;
			margin-top: 500px;
		}
    </style>
</head>
<body>
    <div class="center">
        <div class="neon">COLD BEER<br />SOLD HERE</div>
        <footer>
			<a href="http://robertjmccaffery.com/examples.html">Back to Examples</a> <span style="color: #FFF">|</span> <a href="http://robertjmccaffery.com/">Home</a>
		</footer>
    </div>
</body>
</html>
